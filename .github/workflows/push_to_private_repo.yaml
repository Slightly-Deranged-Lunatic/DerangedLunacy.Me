name: Auto Update Website
on:
    push:
        branches: "main"

jobs:
  build:
      runs-on: ubuntu-latest

      steps:
      - name: checkout public repo
        uses: actions/checkout@v4

      - name: Push to private repo to update on server
        if: ${{ github.repository == 'Slightly-Deranged-Lunatic/DerangedLunacy.Me' }}
        run: |
            git remote add private https://github.com/Slightly-Deranged-Lunatic/DerangedLunacy.Me-Runner.git
            git config --global user.email "actions@github.com"
            git config --global user.name "GitHub Actions"
            git push https://x-access-token:${{ secrets.PAT }}@github.com/Slightly-Deranged-Lunatic/DerangedLunacy.Me-Runner.git main --force
