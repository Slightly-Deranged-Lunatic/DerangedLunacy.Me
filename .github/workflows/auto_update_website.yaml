name: Auto Update Website
on:
    push:
        branches: "main"

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              env:
                PAT: ${{ secrets.PAT }}
                URL: ${{ secrets.REPO_URL }}
            - name: Push to private repo to update on server
              run: |
                git clone https://github.com/Slightly-Deranged-Lunatic/DerangedLunacy.Me
                git push https://$"PAT":@github.com/$"URL"
